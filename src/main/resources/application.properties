spring.application.name=petpick

spring.datasource.url=jdbc:mysql://127.0.0.1:9000/test_pickpet
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.username=
#spring.datasource.password=
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Google OAuth2 Client
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile, email
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_DEVELOP_URL}/login/oauth2/code/google

# JWT
jwt.jwt-key=${JWT_SECRET_KEY}

# OIDC
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com
